# ==================== 全局配置 ====================

# worker进程数，auto表示自动匹配CPU核心数（4C机器会自动设为4）
worker_processes auto;

# 运行nginx的用户，用于文件权限控制
user nginx;

# worker进程core文件大小限制，用于调试崩溃问题
worker_rlimit_core 500m;

# 单个worker进程最大打开文件数，65535足够高并发场景
worker_rlimit_nofile 65535;

# core文件和工作目录的位置
working_directory /var/dump/nginx;

# PID文件路径，用于进程管理
pid /var/run/nginx.pid;

# PCRE JIT编译，开启后可提升正则表达式匹配性能
pcre_jit off;

# ==================== 事件模块配置 ====================

events {
    # 使用epoll事件模型，Linux下高性能网络I/O的标配
    use epoll;

    # 单个worker进程最大连接数，4C16G机器设为20480较合理
    worker_connections 20480;

    # 一次事件循环中接受多个连接，提升短连接场景的吞吐量
    multi_accept on;
}

# ==================== HTTP模块配置 ====================

http {
    # 引入MIME类型映射文件，定义文件扩展名与Content-Type的对应关系
    include mime.types;

    # 允许客户端请求的最大Body大小，超过会返回413错误
    client_max_body_size 100m;

    # 客户端请求Body缓冲区大小，较大值可减少磁盘I/O
    client_body_buffer_size 256k;

    # 客户端请求Header缓冲区大小，32k足够大多数场景
    client_header_buffer_size 32k;

    # 大型请求Header的缓冲区和数量，处理复杂Cookie或长Header时使用
    large_client_header_buffers 4 32k;

    # 默认MIME类型，当无法识别文件类型时使用
    default_type application/octet-stream;

    # ---------- 限流配置 ----------
    # 基于客户端IP的限流区域：每秒最多5个请求
    # 注意：如果所有请求来自固定IP，此配置会导致误限，请根据实际场景调整
    #limit_req_zone $binary_remote_addr zone=per_ip_5r_s:10m rate=5r/s;

    # 基于客户端IP的限流区域：每分钟最多10个请求（更宽松的限流）
    #limit_req_zone $binary_remote_addr zone=per_ip_10r_m:10m rate=10r/m;

    # ---------- 默认首页文件 ----------
    index index.php index.htm index.html;

    # ---------- 代理缓存配置 ----------
    # 缓存路径：/var/cache/nginx/proxy_cache
    # levels=1:2    : 两级目录结构，缓解单目录文件过多问题
    # keys_zone=cache:200m : 缓存元数据区域名称和大小
    # inactive=7d   : 7天未被访问则缓存失效
    # max_size=100g  : 缓存最大占用磁盘空间（16G机器不宜过大）
    # use_temp_path=off : 避免使用临时路径，直接写入缓存目录
    proxy_cache_path /var/cache/nginx/proxy_cache
                     levels=1:2
                     keys_zone=cache:200m
                     inactive=7d
                     max_size=100g
                     use_temp_path=off;

    # ---------- 日志过滤 ----------
    # 定义状态码映射：2xx和3xx返回0（不记录），其他返回1（记录）
    # 用于access_log条件记录，只记录错误和异常请求
    map $status $error_codes {
        default 1;      # 默认记录
        ~^[23] 0;       # 2xx和3xx状态码不记录
    }

    # ---------- 日志格式 ----------
    # JSON格式日志，便于ELK等日志系统采集
    # escape=json 确保特殊字符被正确转义
    log_format main escape=json
        '"remote_addr":"$remote_addr" '          # 客户端IP
        '"time_local":"$time_local" '            # 本地时间
        '"status":$status '                      # HTTP状态码
        '"request":"$request_uri" '              # 请求URI
        '"request_time":$request_time '          # 请求处理时间（秒）
        '"upstream_addr":"$upstream_addr" '      # 上游服务器地址
        '"upstream_response_time":$upstream_response_time ' # 上游响应时间
        '"http_referer":"$http_referer" '        # 来源页面
        '"http_user_agent":"$http_user_agent"';  # 用户代理

    # 条件日志：仅当$error_codes为1时记录（即只记录非2xx/3xx请求）
    access_log /var/log/nginx/access.log main if=$error_codes;

    # 关闭文件不存在的错误日志，减少不必要的日志噪音
    log_not_found off;

    # ---------- 文件传输优化 ----------
    # 开启sendfile，减少数据从内核态到用户态的拷贝次数
    sendfile on;

    # 在sendfile开启时，将响应头和数据包合并发送，减少网络包数量
    tcp_nopush on;

    # 禁用Nagle算法，小数据包立即发送，降低延迟
    tcp_nodelay on;

    # ---------- 字符集和安全 ----------
    # 默认字符集UTF-8
    charset utf-8;

    # 隐藏nginx版本号，提升安全性
    server_tokens off;

    # 处理重定向时保持原始请求的URI格式
    absolute_redirect off;

    # ---------- Gzip压缩配置 ----------
    # 开启gzip压缩
    gzip on;

    # 开启Vary: Accept-Encoding头，告诉代理服务器根据客户端是否支持压缩返回不同内容
    gzip_vary on;

    # 对所有代理请求进行压缩（即使经过代理）
    gzip_proxied any;

    # 最小压缩长度，小于1KB的文件不压缩
    gzip_min_length 1024;

    # 压缩级别1-9，3是性价比最高的选择（压缩率高且CPU消耗小）
    gzip_comp_level 3;

    # 压缩缓冲区大小，16个8K缓冲区
    gzip_buffers 16 8k;

    # 最低HTTP版本，1.1及以上才压缩
    gzip_http_version 1.1;

    # 需要压缩的MIME类型
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/x-javascript
        image/svg+xml
        font/ttf
        font/opentype
        application/vnd.ms-fontobject;

    # 禁用IE6及以下版本的gzip（这些版本有bug）
    gzip_disable "MSIE [1-6]\.";

    # ---------- 超时和连接配置 ----------
    # Keep-Alive连接超时时间，单位秒
    keepalive_timeout 65;

    # 单个Keep-Alive连接最大请求数，可复用连接减少握手开销
    keepalive_requests 1000;

    # 读取客户端请求头的超时时间，超过返回408
    client_header_timeout 30;

    # 读取客户端请求Body的超时时间
    client_body_timeout 30;

    # 发送响应给客户端的超时时间，防止慢客户端长时间占用连接
    send_timeout 30;

    # ---------- 缓冲区优化 ----------
    # 客户端请求Body临时文件存放目录
    client_body_temp_path /tmp/client_body 1 2;

    # 禁止将请求Body存入文件（尽量在内存中处理）
    client_body_in_file_only off;

    # 禁止将请求Body缓存在单个缓冲区
    client_body_in_single_buffer off;

    # ---------- 文件缓存优化 ----------
    # 开放文件缓存：最多缓存10000个文件句柄，60秒不访问则淘汰
    open_file_cache max=10000 inactive=60s;

    # 缓存有效性检查间隔30秒
    open_file_cache_valid 30s;

    # 文件被访问至少2次后才缓存，避免低频文件占用缓存
    open_file_cache_min_uses 2;

    # 缓存文件打开时的错误信息
    open_file_cache_errors on;

    # ---------- 上游连接池 ----------
    # 上游服务器连接池大小（需与proxy_pass配合使用）
    upstream_keepalive_pool_size 64;

    # ---------- 包含其他配置文件 ----------
    # 包含HTTP虚拟主机配置
    include conf/conf.d/*.conf;
}

# ==================== Stream模块配置（TCP/UDP代理） ====================

stream {
    # 包含TCP代理配置
    include conf/tcp.d/*.conf;

    # TCP代理日志格式
    log_format main
        '$remote_addr - [$time_local] '
        '$protocol $status '
        '$bytes_sent $bytes_received '
        '$session_time';

    # TCP代理访问日志
    access_log /var/log/nginx/tcp.log main;
}