name: build-el7

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    container: rockylinux:8
    steps:
      - name: checkout
        uses: actions/checkout@v5
      - name: install
        run: yum install -y make rpm-build dos2unix gcc gcc-c++
      - name: make
        run: make all
      - name: modify workdir
        run: echo %_topdir $PWD/rpmbuild > ~/.rpmmacros
      - name: build
        run: cd rpmbuild && rpmbuild -ba SPECS/nginx-el8.spec
        #run: rpmbuild -ba rpmbuild/SPECS/nginx-el8.spec
      - name: release
        uses: softprops/action-gh-release@v1
        with:
          files: "rpmbuild/RPMS/x86_64/**"
        env:
          GITHUB_TOKEN: ${{ secrets.NGINX_TOKEN }}
